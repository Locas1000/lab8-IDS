<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago Simple</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 300px; margin: auto; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Pagar ahora</h2>
    <form>
        <input type="text" placeholder="Nombre en la tarjeta" required>
        <input type="text" placeholder="Número de tarjeta" maxlength="16" required>
        <div style="display: flex; gap: 5px;">
            <input type="text" placeholder="MM/AA" maxlength="5" required>
            <input type="password" placeholder="CVV" maxlength="3" required>
        </div>
        <button type="submit">Confirmar Pago</button>
    </form>

</body>
</html>
